name: Materialize MathOS specification

on:
  push:
    branches: [develop]
    paths:
      - '.github/spec_payload/**'
  pull_request:
    branches: [develop]

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
      - name: Materialize SPEC.md
        shell: bash
        run: |
          set -euo pipefail
          files=(
            .github/spec_payload/chunk-00
            .github/spec_payload/chunk-01a
            .github/spec_payload/chunk-01b
            .github/spec_payload/chunk-01c
            .github/spec_payload/chunk-01d
            .github/spec_payload/chunk-02
            .github/spec_payload/chunk-03
            .github/spec_payload/chunk-04
            .github/spec_payload/chunk-05
            .github/spec_payload/chunk-06
            .github/spec_payload/chunk-07
          )
          for f in "${files[@]}"; do
            test -f "$f"
          done
          cat "${files[@]}" | base64 --decode | gzip --decompress > SPEC.md
          grep -q '^# Mathematical Claim Engine' SPEC.md
          grep -q '^# Constructiveness Profile (Normative)' SPEC.md
          rm -rf .github/spec_payload
          rm .github/workflows/materialize-spec.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: add binding Mathematical Claim Engine specification"
          git push origin HEAD:develop
